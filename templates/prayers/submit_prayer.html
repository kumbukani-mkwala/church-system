{% extends 'base.html' %}

{% block page_title %}Submit Prayer Request{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width: 700px;">

    <div class="card border-0 shadow-sm">

        <!-- HEADER -->
        <div class="card-header bg-white border-0">
            <h5 class="fw-bold mb-0">Submit Prayer Request</h5>
            <small class="text-muted">Share your prayer with the church leadership</small>
        </div>

        <!-- BODY -->
        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <!-- MESSAGE -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Your Prayer</label>
                    <textarea name="message"
                              class="form-control"
                              rows="5"
                              placeholder="Write your prayer request here..."
                              required></textarea>
                </div>

                <!-- PRIVATE OPTION -->
                <div class="form-check mb-4">
                    <input type="checkbox" name="is_private" class="form-check-input" id="privateCheck">
                    <label class="form-check-label" for="privateCheck">
                        Keep this prayer private (only visible to pastor)
                    </label>
                </div>

                <!-- ACTIONS -->
                <div class="d-flex justify-content-between">

                    <a href="/member/" class="btn btn-outline-secondary">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-dark px-4">
                        <i class="bi bi-send"></i> Submit Prayer
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
