<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Church System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        /* TOPBAR */
        .topbar {
            background: #ffffff;
            height: 65px;
            padding: 0 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        /* SIDE MENU (HIDDEN BY DEFAULT) */
        
       .side-menu.active {
            left: 0;
        }

        .side-menu h4 {
            margin-bottom: 20px;
        }

        .side-menu a {
            display: block;
            color: #9ca3af;
            text-decoration: none;
            padding: 10px 0;
            font-size: 14px;
        }

        .side-menu a:hover {
            color: white;
        }

        /* OVERLAY */
        .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.08);
    top: 0;
    left: 0;
    display: none;
    z-index: 1500;
}
        .overlay.active {
            display: block;
        }

        /* CONTENT */
        .content {
            padding: 25px;
        }

        /* SEARCH */
        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 6px 10px 6px 30px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            top: 8px;
            left: 8px;
            color: #6b7280;
        }

        /* ICONS */
        .icon-box {
            position: relative;
            cursor: pointer;
            font-size: 18px;
            color: #374151;
        }

        .badge-dot {
            position: absolute;
            top: 2px;
            right: -2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* USER */
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .menu-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1f2937;
    color: white;
    border-radius: 10px;
    padding: 15px;
    text-decoration: none;
    font-size: 14px;
    height: 90px;
    transition: 0.3s;
}

.menu-card i {
    font-size: 22px;
    margin-bottom: 5px;
}

.menu-card:hover {
    background: #374151;
}


/* SIDE MENU */
.side-menu {
    position: fixed;
    top: 0;
    left: -320px;
    width: 320px;
    height: 100%;
    background: #0f172a;
    color: white;
    padding: 20px;
    transition: 0.35s ease;
    z-index: 2000;
    overflow-y: auto;
}

.side-menu.active {
    left: 0;
}

/* HEADER */
.menu-header {
    border-bottom: 1px solid #1f2937;
    padding-bottom: 10px;
}

/* SECTION TITLE */
.menu-section {
    font-size: 11px;
    color: #9ca3af;
    letter-spacing: 1px;
}

/* GRID */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 10px;
}

/* CARD */
.menu-card {
    background: #1e293b;
    border-radius: 14px;
    padding: 18px 10px;
    text-align: center;
    color: white;
    text-decoration: none;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* ICON */
.menu-card i {
    font-size: 22px;
    margin-bottom: 6px;
}

/* TEXT */
.menu-card span {
    font-size: 13px;
}

/* HOVER EFFECT */
.menu-card:hover {
    background: #334155;
    transform: translateY(-3px) scale(1.03);
}

/* LOGOUT */
.menu-logout {
    display: block;
    text-align: center;
    background: #7f1d1d;
    padding: 12px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.menu-logout:hover {
    background: #991b1b;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

    <!-- HEADER -->
    <div class="menu-header d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">Menu</h5>
        <i class="bi bi-x-lg fs-5" id="closeMenu" style="cursor:pointer;"></i>
    </div>

    <!-- SECTION: MAIN -->
    <small class="menu-section">MAIN</small>

    <div class="menu-grid">

        <a href="/" class="menu-card">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>

        <a href="#" class="menu-card">
            <i class="bi bi-journal-bookmark"></i>
            <span>Sermons</span>
        </a>

        <a href="#" class="menu-card">
            <i class="bi bi-calendar-event"></i>
            <span>Events</span>
        </a>

        <a href="/prayers/submit/" class="menu-card">
            <i class="bi bi-heart"></i>
            <span>Prayer</span>
        </a>

    </div>

    <!-- SECTION: MANAGEMENT -->
    <small class="menu-section mt-4">MANAGEMENT</small>

    <div class="menu-grid">

        <a href="#" class="menu-card">
            <i class="bi bi-people"></i>
            <span>Members</span>
        </a>

        <a href="#" class="menu-card">
            <i class="bi bi-megaphone"></i>
            <span>Announcements</span>
        </a>

        <a href="#" class="menu-card">
            <i class="bi bi-cash-stack"></i>
            <span>Payments</span>
        </a>

        <a href="#" class="menu-card">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
        </a>

    </div>

    <!-- LOGOUT -->
    <div class="mt-4">
        <a href="/logout/" class="menu-logout">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>

</div>

<!-- MAIN -->
<div>

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

        <!-- LEFT -->
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-list fs-3" id="menuToggle" style="cursor:pointer;"></i>

            <h6 class="mb-0 fw-semibold text-dark">
                {% block page_title %}Dashboard{% endblock %}
            </h6>
        </div>

        <!-- RIGHT -->
        <div class="d-flex align-items-center gap-4">

            <div class="search-box d-none d-md-block">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search...">
            </div>

            <div class="icon-box">
                <i class="bi bi-bell"></i>
                <span class="badge-dot bg-danger"></span>
            </div>

            <div class="dropdown">
                <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
                   href="#" data-bs-toggle="dropdown">

                    <div class="user-avatar">
                        {{ request.user.username|first|upper }}
                    </div>
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item text-danger" href="/logout/">Logout</a></li>
                </ul>
            </div>

        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

<script>
const menuToggle = document.getElementById("menuToggle");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

menuToggle.addEventListener("click", () => {
    sideMenu.classList.toggle("active");
    overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
});


const closeMenu = document.getElementById("closeMenu");

closeMenu.addEventListener("click", () => {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
