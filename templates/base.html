<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Church System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #cbd5f5;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: white;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Church CMS</h4>
            <hr>

            <a href="#">Dashboard</a>
            <a href="#">Sermons</a>
            <a href="#">Announcements</a>
            <a href="#">Payments</a>
            <a href="#">Events</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

</body>
</html>
